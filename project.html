<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Complete HTML Form With CSS</title>

    <style>

        /* UNIVERSAL SELECTOR */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        /* BODY TAG */
        body{
            background-color:#f2f2f2;
            padding:30px;
        }

        /* FORM STYLING */
        form{
            width:500px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        /* HEADING */
        h1{
            text-align:center;
            margin-bottom:20px;
            color:darkblue;
        }

        /* LABEL */
        label{
            font-weight:bold;
            color:#333;
        }

        /* ALL INPUT TYPES */
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        input[type="file"],
        input[type="search"],
        input[type="tel"],
        input[type="url"],
        select,
        textarea{

            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:2px solid gray;
            border-radius:5px;
        }

        /* INPUT FOCUS */
        input:focus,
        textarea:focus,
        select:focus{
            border-color:blue;
            outline:none;
            background:#eef5ff;
        }

        /* CHECKBOX + RADIO */
        input[type="checkbox"],
        input[type="radio"]{
            margin-right:5px;
            margin-left:10px;
        }

        /* COLOR INPUT */
        input[type="color"]{
            width:100%;
            height:45px;
            border:none;
            margin-bottom:15px;
        }

        /* RANGE INPUT */
        input[type="range"]{
            width:100%;
            margin-bottom:15px;
        }

        /* BUTTON STYLE */
        button,
        input[type="submit"],
        input[type="reset"]{

            padding:10px 15px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin-top:10px;
            font-size:15px;
        }

        /* SIMPLE BUTTON */
        button{
            background:orange;
            color:white;
        }

        /* SUBMIT BUTTON */
        input[type="submit"]{
            background:green;
            color:white;
        }

        /* RESET BUTTON */
        input[type="reset"]{
            background:red;
            color:white;
        }

        /* HOVER EFFECT */
        button:hover,
        input[type="submit"]:hover,
        input[type="reset"]:hover{
            opacity:0.8;
        }

        /* PLACEHOLDER */
        ::placeholder{
            color:gray;
        }

    </style>

</head>

<body>

    <h1>Registration Form</h1>

    <!-- FORM TAG -->
    <form action="submit.php"
          method="POST"
          enctype="multipart/form-data"
          target="_blank"
          autocomplete="on">

        <!-- TEXT -->
        <label for="name">Full Name:</label>
        <input type="text"
               id="name"
               name="name"
               placeholder="Enter your full name">

        <!-- PASSWORD -->
        <label for="pass">Password:</label>
        <input type="password"
               id="pass"
               name="password"
               placeholder="Enter password">

        <!-- EMAIL -->
        <label for="email">Email:</label>
        <input type="email"
               id="email"
               name="email"
               placeholder="Enter email">

        <!-- NUMBER -->
        <label for="age">Age:</label>
        <input type="number"
               id="age"
               name="age"
               placeholder="Enter age">

        <!-- DATE -->
        <label for="dob">Date of Birth:</label>
        <input type="date"
               id="dob"
               name="dob">

        <!-- CHECKBOX -->
        <label>Skills:</label><br>

        <input type="checkbox" id="html" name="skill">
        <label for="html">HTML</label>

        <input type="checkbox" id="css" name="skill">
        <label for="css">CSS</label>

        <input type="checkbox" id="js" name="skill">
        <label for="js">JavaScript</label>

        <br><br>

        <!-- RADIO -->
        <label>Gender:</label><br>

        <input type="radio" id="male" name="gender">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender">
        <label for="female">Female</label>

        <br><br>

        <!-- SELECT + OPTION -->
        <label for="city">Select City:</label>

        <select id="city" name="city">

            <option value="">--Choose City--</option>
            <option value="Indore">Indore</option>
            <option value="Bhopal">Bhopal</option>
            <option value="Ujjain">Ujjain</option>
            <option value="Nagda">Nagda</option>

        </select>

        <!-- TEXTAREA -->
        <label for="message">Message:</label>

        <textarea id="message"
                  name="message"
                  rows="5"
                  placeholder="Write your message">
        </textarea>

        <!-- FILE -->
        <label for="file">Upload File:</label>
        <input type="file" id="file" name="file">

        <!-- HIDDEN -->
        <input type="hidden" name="userid" value="101">

        <!-- COLOR -->
        <label for="color">Choose Color:</label>
        <input type="color" id="color" name="color">

        <!-- RANGE -->
        <label for="volume">Volume:</label>
        <input type="range"
               id="volume"
               name="volume"
               min="0"
               max="100">

        <!-- SEARCH -->
        <label for="search">Search:</label>
        <input type="search"
               id="search"
               name="search"
               placeholder="Search here">

        <!-- TEL -->
        <label for="phone">Phone Number:</label>
        <input type="tel"
               id="phone"
               name="phone"
               placeholder="Enter phone number">

        <!-- URL -->
        <label for="website">Website URL:</label>
        <input type="url"
               id="website"
               name="website"
               placeholder="Enter website URL">

        <!-- BUTTON -->
        <button type="button">Simple Button</button>

        <!-- SUBMIT -->
        <input type="submit" value="Submit Form">

        <!-- RESET -->
        <input type="reset" value="Reset Form">

    </form>

</body>
</html>
