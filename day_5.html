<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project1</title>
    <style>
      .container{
        margin: 0px 500px 0px 500px;
        padding: 5px;
        background-color: rgb(108, 242, 242);
        border: 5px solid rgb(5, 5, 5);
        border-radius: 20px;
        display: flex;
        justify-content:center;
      }
      .form{
        margin: 5px;
        padding: 5px;
        font-style: oblique;
        font-size: 20px;
      }
      #submit{
        background-color: rgb(57, 210, 131);
        height: 50px;
        width: 90px;
        font-size: 18px;
        margin-left: 35%;
      }
    </style>
  </head>
  <body>
    <div class="container">
    <form action="" class="form">
      <h1>Job Application with resume Upload</h1>
      <h3>Contect Information</h3>
      <label for="name">first name</label>
      <input type="text" name="name" id="name" />
      <label for="name1">Last name</label>
      <input type="text" name="name" id="name1" />
      <br /><br />
      <label for="email">Email :</label><br>
      <input type="email" name="email" id="email" />
      <br /><br />
      <label for="mobile">Phone: </label><br>
      <input type="tel" name="mobile" id="mobile" />
      <br />
      <h3>Position</h3>
      <label for="position">Position you appliye for</label><br />
      <input type="text" name="position" id="position" />
      <br /><br />
      <label for="resume">Resume</label><br />
      <input type="file" name="resume" id="resume" />
      <br /><br />
      <label for="portfolio">portfolio Website</label>
      <input type="text" name="" id="portfolio" />
      <br />
      <h4>are you willing to relocate</h4>
      <label for="relocate">yes</label>
      <input type="radio" name="relocate" id="relocate">
      <label for="relocate">No</label>
      <input type="radio" name="relocate" id="relocate">
      <label for="relocate">Not Sure</label>
      <input type="radio" name="relocate" id="relocate">
      <br><br>
      <label for="edu">Highest Education</label>
      <select name="edu" id="edu">
       <option value="undergraduate">Associate degree</option> 
       <option value="bachelor degree">Bachelor's degree</option>
       <option value="master's degree">Master's Degree</option>
       <option value="doctoral degree">Doctoral degree</option>
      </select>

      <fieldset style="width: 500px;">
        <legend>Skills</legend>
        <label for="html">HTML</label>
        <input type="checkbox" name="html" id="html"><br>
        <label for="css">CSS</label>
        <input type="checkbox" name="css" id="css"><br>
        <label for="JS">Java Script</label>
        <input type="checkbox" name="JS" id="JS"><br>
        <label for="c">C programming</label>
        <input type="checkbox" name="C" id="C">
      </fieldset>
      <br><br>
      <label for="ex">Experience (in Year)</label>
      <input type="number" name="ex" id="ex" min="0" max="10">
      <br><br>
      <fieldset style="width: 500px;">
        <legend>Availability</legend>
        <label for="avi">Full time</label>
        <input type="radio" name="avi" id="avi">
        <label for="avi">Internship</label>
        <input type="radio" name="avi" id="avi">
      </fieldset>
      <br>
      <button type="submit" id="submit">Submit</button>
    </form>
    </div>
  </body>
</html>
