    <fieldset style="height: 800px; width: 100; border-radius: 50px; margin-left: 100px; margin-right: 500; padding: 3px;">
   <legend >This is login page</legend>

    <h2>HTML Form Example</h2>

    <form action="submit.php" method="post" enctype="multipart/form-data"
          target="_self" autocomplete="on" class="form" style="height: 640px; width: 50; border-radius: 2px; margin-left: 600px; padding: 1px;">

        <!-- Text -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <br><br>

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="abc@gmail.com">
        <br><br>

        <!-- Password -->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
        <br><br>

        <!-- Number -->
        <label for="mobile">Mobile Number:</label>
        <input type="number" id="mobile" name="mobile">
        <br><br>

        <!-- Date -->
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">
        <br><br>

        <!-- Radio -->
        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>
        <br><br>

        <!-- Checkbox -->
        <label>Hobbies:</label>
        <input type="checkbox" id="reading" name="hobby" value="Reading">
        <label for="reading">Reading</label>

        <input type="checkbox" id="gaming" name="hobby" value="Gaming">
        <label for="gaming">Gaming</label>
        <br><br>

        <!-- Select & Option -->
        <label for="city">City:</label>
        <select id="city" name="city">
            <option value="mumbai">Mumbai</option>
            <option value="delhi">Delhi</option>
            <option value="jaipur">Jaipur</option>
        </select>
        <br><br>

        <!-- Textarea -->
        <label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="4" cols="30"></textarea>
        <br><br>

        <!-- File -->
        <label for="file">Upload File:</label>
        <input type="file" id="file" name="file">
        <br><br>

        <!-- Hidden -->
        <input type="hidden" name="userid" value="101">

        <!-- Color -->
        <label for="color">Favorite Color:</label>
        <input type="color" id="color" name="color">
        <br><br>

        <!-- Range -->
        <label for="range">Range:</label>
        <input type="range" id="range" name="range" min="0" max="100">
        <br><br>

        <!-- Search -->
        <label for="search">Search:</label>
        <input type="search" id="search" name="search">
        <br><br>

        <!-- Tel -->
        <label for="tel">Telephone:</label>
        <input type="tel" id="tel" name="tel">
        <br><br>

        <!-- URL -->
        <label for="website">Website:</label>
        <input type="www.google.com" id="website" name="website">
        <br><br>

        <!-- Submit -->
        <input type="submit" value="Submit">

        <!-- Reset -->
        <input type="reset" value="Reset">

        <!-- Button -->
        <button type="button">Click Me</button>

    </form>
    </fieldset>
</body>
